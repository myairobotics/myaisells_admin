name: Build and Push React App Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read # allows GITHUB_TOKEN to pull @yourorg packages from npm.pkg.github.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 22.x
          node-auth-token: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build app
        run: pnpm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myai-admin:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/myai-admin:latest
